name: Mantle Migration Lint

# Demonstrates the linter as a CI gate on this repo's own example contracts:
#   * produces SARIF for examples/ so findings show in the Security / "Files
#     changed" view (informational: --fail-on never keeps this job green), and
#   * gates on the Mantle-safe contract, which reports 0 findings -> exit 0.
# (Drop this into a real contract repo and point it at your contracts to gate
#  migration PRs on HIGH-severity Mantle issues.)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write   # required to upload SARIF

jobs:
  mantle-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint example contracts -> SARIF (informational)
        run: python -m mantle_lint.cli examples --format sarif --fail-on never > mantle-lint.sarif

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: mantle-lint.sarif

      - name: Gate — the Mantle-safe contract must pass (0 findings)
        run: python -m mantle_lint.cli examples/CleanStaking.sol --fail-on HIGH
