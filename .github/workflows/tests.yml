name: Tests

# Runs the rule + AI + benchmark-loader test suite on every push/PR.
# Zero dependencies — the core tool is stdlib-only.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run test suite
        run: python tests/test_rules.py
